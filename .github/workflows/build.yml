name: Build Android App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project
      run: unzip jal-screen-recoder-app.zip -d project

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        cd project/jal-screen-recoder-app
        npm install

    - name: Prebuild Expo
      run: |
        cd project/jal-screen-recoder-app
        npx expo prebuild --platform android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android APK
      run: |
        cd project/jal-screen-recoder-app/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Completed APK
      uses: actions/upload-artifact@v4
      with:
        name: Jal-Screen-Recorder-Working-APK
        path: "**/*.apk"
