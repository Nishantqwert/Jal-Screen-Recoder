name: Build Android App
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Unzip Project
      run: unzip jal-screen-recoder-app.zip -d project
    - name: Inject Master Android Recording Permissions
      run: |
        cd project/jal-screen-recoder-app
        node -e "
        const fs = require('fs');
        if (fs.existsSync('app.json')) {
          let data = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if (!data.expo) data.expo = {};
          if (!data.expo.android) data.expo.android = {};
          data.expo.android.permissions = [
            'RECORD_AUDIO',
            'MODIFY_AUDIO_SETTINGS',
            'WRITE_EXTERNAL_STORAGE',
            'READ_EXTERNAL_STORAGE',
            'READ_MEDIA_VIDEO',
            'READ_MEDIA_AUDIO',
            'FOREGROUND_SERVICE',
            'FOREGROUND_SERVICE_MEDIA_PROJECTION',
            'SYSTEM_ALERT_WINDOW'
          ];
          fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
        }
        "
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Dependencies
      run: |
        cd project/jal-screen-recoder-app
        npm install
    - name: Prebuild Expo
      run: |
        cd project/jal-screen-recoder-app
        npx expo prebuild --platform android
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Build Standalone APK
      run: |
        cd project/jal-screen-recoder-app/android
        chmod +x gradlew
        ./gradlew assembleDebug
    - name: Upload Completed APK
      uses: actions/upload-artifact@v4
      with:
        name: Jal-Screen-Recorder-Working-APK
        path: "**/*.apk"
